name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-macos-arm64:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: code/src-tauri

      - name: Install frontend dependencies
        run: |
          cd code
          pnpm install --shamefully-hoist

      - name: Build Tauri app (ARM64)
        run: |
          cd code
          npx tauri build --target aarch64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            code/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            code/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg.sig

  build-macos-x64:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: code/src-tauri

      - name: Install frontend dependencies
        run: |
          cd code
          pnpm install --shamefully-hoist

      - name: Build Tauri app (x64)
        run: |
          cd code
          npx tauri build --target x86_64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: |
            code/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            code/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg.sig

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: code/src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        run: |
          cd code
          pnpm install --shamefully-hoist

      - name: Build Tauri app
        run: |
          cd code
          npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            code/src-tauri/target/release/bundle/deb/*.deb
            code/src-tauri/target/release/bundle/deb/*.deb.sig
            code/src-tauri/target/release/bundle/appimage/*.AppImage
            code/src-tauri/target/release/bundle/appimage/*.AppImage.sig

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: code/src-tauri

      - name: Install frontend dependencies
        run: |
          cd code
          pnpm install --shamefully-hoist

      - name: Build Tauri app
        run: |
          cd code
          npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            code/src-tauri/target/release/bundle/msi/*.msi
            code/src-tauri/target/release/bundle/msi/*.msi.sig
            code/src-tauri/target/release/bundle/nsis/*.exe
            code/src-tauri/target/release/bundle/nsis/*.exe.sig

  release:
    needs: [build-macos-arm64, build-macos-x64, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: always() && (needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success' || needs.build-linux.result == 'success' || needs.build-windows.result == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      - name: Rename artifacts (normalize filename)
        run: |
          # Tauri uses product name "Git Worktree Manager" which creates files with spaces
          # We normalize to dot format: Git.Worktree.Manager_xxx.dmg for consistency
          find artifacts -type f -name "* *" | while read file; do
            newname=$(echo "$file" | sed 's/ /./g')
            mv "$file" "$newname"
          done
          echo "=== Renamed artifacts ==="
          ls -R artifacts

      - name: Generate update manifests
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # macOS ARM64
          DMG_FILES=$(find artifacts/macos-arm64 -name "*.dmg" ! -name "*.sig" 2>/dev/null || true)
          if [ -n "$DMG_FILES" ]; then
            DMG_FILE=$(echo "$DMG_FILES" | head -n1)
            SIG_FILE="${DMG_FILE}.sig"
            if [ ! -f "$SIG_FILE" ]; then
              echo "ERROR: Signature file not found for $DMG_FILE"
              exit 1
            fi
            SIGNATURE=$(cat "$SIG_FILE")
            DMG_NAME=$(basename "$DMG_FILE")

            cat > darwin-aarch64.json << EOF
          {
            "version": "$VERSION",
            "pub_date": "$PUBLISHED_AT",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.TAG_NAME }}/${DMG_NAME}"
              }
            }
          }
          EOF
            echo "Generated darwin-aarch64.json with url containing: ${DMG_NAME}"
          fi

          # macOS x64
          DMG_FILES=$(find artifacts/macos-x64 -name "*.dmg" ! -name "*.sig" 2>/dev/null || true)
          if [ -n "$DMG_FILES" ]; then
            DMG_FILE=$(echo "$DMG_FILES" | head -n1)
            SIG_FILE="${DMG_FILE}.sig"
            if [ ! -f "$SIG_FILE" ]; then
              echo "ERROR: Signature file not found for $DMG_FILE"
              exit 1
            fi
            SIGNATURE=$(cat "$SIG_FILE")
            DMG_NAME=$(basename "$DMG_FILE")

            cat > darwin-x86_64.json << EOF
          {
            "version": "$VERSION",
            "pub_date": "$PUBLISHED_AT",
            "platforms": {
              "darwin-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.TAG_NAME }}/${DMG_NAME}"
              }
            }
          }
          EOF
            echo "Generated darwin-x86_64.json with url containing: ${DMG_NAME}"
          fi

          # Linux x64
          APPIMAGE_FILES=$(find artifacts/linux-x64 -name "*.AppImage" ! -name "*.sig" 2>/dev/null || true)
          if [ -n "$APPIMAGE_FILES" ]; then
            APPIMAGE_FILE=$(echo "$APPIMAGE_FILES" | head -n1)
            SIG_FILE="${APPIMAGE_FILE}.sig"
            if [ ! -f "$SIG_FILE" ]; then
              echo "ERROR: Signature file not found for $APPIMAGE_FILE"
              exit 1
            fi
            SIGNATURE=$(cat "$SIG_FILE")
            APPIMAGE_NAME=$(basename "$APPIMAGE_FILE")

            cat > linux-x86_64.json << EOF
          {
            "version": "$VERSION",
            "pub_date": "$PUBLISHED_AT",
            "platforms": {
              "linux-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.TAG_NAME }}/${APPIMAGE_NAME}"
              }
            }
          }
          EOF
            echo "Generated linux-x86_64.json with url containing: ${APPIMAGE_NAME}"
          fi

          # Windows x64 (NSIS exe)
          EXE_FILES=$(find artifacts/windows-x64 -name "*.exe" ! -name "*.sig" 2>/dev/null || true)
          if [ -n "$EXE_FILES" ]; then
            EXE_FILE=$(echo "$EXE_FILES" | head -n1)
            SIG_FILE="${EXE_FILE}.sig"
            if [ ! -f "$SIG_FILE" ]; then
              echo "ERROR: Signature file not found for $EXE_FILE"
              exit 1
            fi
            SIGNATURE=$(cat "$SIG_FILE")
            EXE_NAME=$(basename "$EXE_FILE")

            cat > win-x86_64.json << EOF
          {
            "version": "$VERSION",
            "pub_date": "$PUBLISHED_AT",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.TAG_NAME }}/${EXE_NAME}"
              }
            }
          }
          EOF
            echo "Generated win-x86_64.json with url containing: ${EXE_NAME}"
          fi

          echo "=== Generated update manifests ==="
          ls -la *.json 2>/dev/null || echo "No manifests generated"

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.sig" \) -exec cp {} release-files/ \;
          cp *.json release-files/ 2>/dev/null || true
          echo "=== Release files ==="
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          name: Git Worktree Manager ${{ steps.get_version.outputs.TAG_NAME }}
          body: |
            ## 📦 Download

            ### macOS
            - **Apple Silicon (M1/M2/M3)**: Download `*_aarch64.dmg`
            - **Intel**: Download `*_x64.dmg`

            ### Windows
            Download `.msi` or `_setup.exe` file

            ### Linux
            - Debian/Ubuntu: Download `.deb` file
            - Universal: Download `.AppImage` file

            ## 📝 Changelog
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

            ## 🔄 自动更新
            此版本支持自动更新功能，可在设置中检查更新。
          draft: false
          prerelease: false
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
