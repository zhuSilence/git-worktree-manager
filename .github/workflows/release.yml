name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x64
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          target: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: |
          cd code
          npm install

      - name: Build frontend
        run: |
          cd code
          npm run build

      - name: Build Rust (debug)
        run: |
          cd code/src-tauri
          cargo build --target ${{ matrix.target }}

      - name: Build Tauri app
        run: |
          cd code
          npx tauri build --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            code/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            code/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

  build-linux:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        run: |
          cd code
          npm install

      - name: Build frontend
        run: |
          cd code
          npm run build

      - name: Build Rust (debug)
        run: |
          cd code/src-tauri
          cargo build

      - name: Build Tauri app
        run: |
          cd code
          npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            code/src-tauri/target/release/bundle/deb/*.deb
            code/src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: |
          cd code
          npm install

      - name: Build frontend
        run: |
          cd code
          npm run build

      - name: Build Rust (debug)
        run: |
          cd code/src-tauri
          cargo build

      - name: Build Tauri app
        run: |
          cd code
          npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            code/src-tauri/target/release/bundle/msi/*.msi
            code/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Worktree Manager ${{ github.ref_name }}
          body: |
            ## 安装方式
            
            ### macOS
            - Apple Silicon (M1/M2/M3): 下载 `*_aarch64.dmg`
            - Intel: 下载 `*_x64.dmg`
            
            ### Windows
            下载 `.msi` 或 `_setup.exe` 文件
            
            ### Linux
            - Debian/Ubuntu: 下载 `.deb` 文件
            - 通用: 下载 `.AppImage` 文件
            
            ## 更新日志
            详见 CHANGELOG.md
          draft: true
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}