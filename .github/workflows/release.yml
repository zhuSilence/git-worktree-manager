name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.0.8)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  pre-release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate version consistency
        run: |
          PKG_VERSION=$(jq -r .version code/package.json)
          TAURI_VERSION=$(jq -r .version code/src-tauri/tauri.conf.json)
          CARGO_VERSION=$(grep '^version' code/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "package.json: $PKG_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"
          echo "Cargo.toml: $CARGO_VERSION"
          if [ "$PKG_VERSION" != "$TAURI_VERSION" ] || [ "$PKG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch detected!"
            exit 1
          fi

  build-macos-arm64:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: code/src-tauri

      - name: Install frontend dependencies
        run: |
          cd code
          pnpm install --frozen-lockfile

      - name: Build Tauri app (ARM64)
        run: |
          cd code
          pnpm tauri build --target aarch64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            code/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            code/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg.sig

  build-macos-x64:
    runs-on: macos-latest  # ARM64 runner with cross-compilation support

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: code/src-tauri

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install frontend dependencies
        run: |
          cd code
          pnpm install --frozen-lockfile

      - name: Build Tauri app (x64)
        run: |
          cd code
          pnpm tauri build --target x86_64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: |
            code/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            code/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg.sig

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: code/src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        run: |
          cd code
          pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: |
          cd code
          pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            code/src-tauri/target/release/bundle/deb/*.deb
            code/src-tauri/target/release/bundle/deb/*.deb.sig
            code/src-tauri/target/release/bundle/appimage/*.AppImage
            code/src-tauri/target/release/bundle/appimage/*.AppImage.sig

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: code/src-tauri

      - name: Install frontend dependencies
        run: |
          cd code
          pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: |
          cd code
          pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            code/src-tauri/target/release/bundle/msi/*.msi
            code/src-tauri/target/release/bundle/msi/*.msi.sig
            code/src-tauri/target/release/bundle/nsis/*.exe
            code/src-tauri/target/release/bundle/nsis/*.exe.sig

  release:
    needs: [pre-release-check, build-macos-arm64, build-macos-x64, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: always() && (needs.build-macos-arm64.result == 'success' || needs.build-macos-x64.result == 'success' || needs.build-linux.result == 'success' || needs.build-windows.result == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Rename artifacts (normalize filename)
        run: |
          # Tauri uses product name "Git Worktree Manager" which creates files with spaces
          # We normalize to dot format: Git.Worktree.Manager_xxx.dmg for consistency
          find artifacts -type f -name "* *" | while read file; do
            newname=$(echo "$file" | sed 's/ /./g')
            mv "$file" "$newname"
          done
          # Also rename corresponding .sig files if they exist
          find artifacts -type f -name "*.sig" | while read sigfile; do
            if [[ "$sigfile" == *" "* ]]; then
              newname=$(echo "$sigfile" | sed 's/ /./g')
              mv "$sigfile" "$newname"
            fi
          done
          ls -R artifacts

      - name: Rename sig files to match DMG names
        run: |
          # Ensure .sig files match the renamed DMG files
          for dmg in artifacts/*/*.dmg; do
            if [ -f "$dmg" ]; then
              sigfile="${dmg}.sig"
              # Check if there's a .sig file with the same base name
              if [ -f "$sigfile" ]; then
                echo "Found signature: $sigfile"
              else
                echo "Warning: No signature found for $dmg"
              fi
            fi
          done

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate update manifests
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # macOS ARM64
          if [ -f "artifacts/macos-arm64/"*".dmg" ]; then
            DMG_FILE=$(ls artifacts/macos-arm64/*.dmg | head -n1)
            SIG_FILE="${DMG_FILE}.sig"
            SIGNATURE=$(cat "$SIG_FILE" 2>/dev/null || echo "")
            DMG_NAME=$(basename "$DMG_FILE")

            cat > darwin-aarch64.json << EOF
          {
            "version": "$VERSION",
            "pub_date": "$PUBLISHED_AT",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/zhuSilence/git-worktree-manager/releases/download/v${VERSION}/${DMG_NAME}"
              }
            }
          }
          EOF
          fi

          # macOS x64
          if [ -f "artifacts/macos-x64/"*".dmg" ]; then
            DMG_FILE=$(ls artifacts/macos-x64/*.dmg | head -n1)
            SIG_FILE="${DMG_FILE}.sig"
            SIGNATURE=$(cat "$SIG_FILE" 2>/dev/null || echo "")
            DMG_NAME=$(basename "$DMG_FILE")

            cat > darwin-x86_64.json << EOF
          {
            "version": "$VERSION",
            "pub_date": "$PUBLISHED_AT",
            "platforms": {
              "darwin-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/zhuSilence/git-worktree-manager/releases/download/v${VERSION}/${DMG_NAME}"
              }
            }
          }
          EOF
          fi

          # Linux x64
          if [ -f "artifacts/linux-x64/"*".AppImage" ]; then
            APPIMAGE_FILE=$(ls artifacts/linux-x64/*.AppImage | head -n1)
            SIG_FILE="${APPIMAGE_FILE}.sig"
            SIGNATURE=$(cat "$SIG_FILE" 2>/dev/null || echo "")
            APPIMAGE_NAME=$(basename "$APPIMAGE_FILE")

            cat > linux-x86_64.json << EOF
          {
            "version": "$VERSION",
            "pub_date": "$PUBLISHED_AT",
            "platforms": {
              "linux-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/zhuSilence/git-worktree-manager/releases/download/v${VERSION}/${APPIMAGE_NAME}"
              }
            }
          }
          EOF
          fi

          # Windows x64
          if [ -f "artifacts/windows-x64/"*".exe" ]; then
            EXE_FILE=$(ls artifacts/windows-x64/*.exe | head -n1)
            SIG_FILE="${EXE_FILE}.sig"
            SIGNATURE=$(cat "$SIG_FILE" 2>/dev/null || echo "")
            EXE_NAME=$(basename "$EXE_FILE")

            cat > win-x86_64.json << EOF
          {
            "version": "$VERSION",
            "pub_date": "$PUBLISHED_AT",
            "platforms": {
              "win-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/zhuSilence/git-worktree-manager/releases/download/v${VERSION}/${EXE_NAME}"
              }
            }
          }
          EOF
          fi

          echo "Generated update manifests:"
          ls -la *.json 2>/dev/null || echo "No manifests generated"

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.sig" \) -exec cp {} release-files/ \;
          cp *.json release-files/ 2>/dev/null || true
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Git Worktree Manager ${{ github.ref_name }}
          body: |
            ## 📦 Download

            ### macOS
            - **Apple Silicon (M1/M2/M3)**: Download `*_aarch64.dmg`
            - **Intel**: Download `*_x64.dmg`

            ### Windows
            Download `.msi` or `_setup.exe` file

            ### Linux
            - Debian/Ubuntu: Download `.deb` file
            - Universal: Download `.AppImage` file

            ## 📝 Changelog
            See [CHANGELOG.md](https://github.com/zhuSilence/git-worktree-manager/blob/main/CHANGELOG.md)

            ## 🔄 自动更新
            此版本支持自动更新功能，可在设置中检查更新。
          draft: true
          prerelease: false
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}