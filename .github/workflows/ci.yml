name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: |
          cd code
          pnpm install --shamefully-hoist
        timeout-minutes: 15

      - name: Build frontend
        run: |
          cd code
          npm run build

      - name: Type check
        run: |
          cd code
          npx tsc --noEmit

      - name: Lint
        run: |
          cd code
          npm run lint || true  # 暂时不阻断CI，先收集问题

      - name: Run tests
        run: |
          cd code
          npm run test:run

  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './code/src-tauri -> target'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Check Rust code
        run: |
          cd code/src-tauri
          cargo check

      - name: Run tests
        run: |
          cd code/src-tauri
          cargo test

      - name: Clippy checks
        run: |
          cd code/src-tauri
          cargo clippy -- -D warnings || true  # 暂时不阻断

      - name: Check formatting
        run: |
          cd code/src-tauri
          cargo fmt -- --check || true